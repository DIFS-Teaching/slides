<svg width="600" height="250" viewBox="0 0 600 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1f4e79" />
    </marker>
  </defs>

  <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
    <feDropShadow dx="2" dy="2" stdDeviation="1.5" flood-opacity="0.3"/>
  </filter>

  <g filter="url(#shadow)">
    <rect x="210" y="20" width="180" height="60" fill="#c6d9f1" stroke="#1f4e79" stroke-width="2" />
    <text x="300" y="60" font-family="Arial, sans-serif" font-size="28" text-anchor="middle" fill="#1f4e79">data</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="20" y="150" width="130" height="60" fill="#c6d9f1" stroke="#1f4e79" stroke-width="2" />
    <text x="85" y="190" font-family="Arial, sans-serif" font-size="28" text-anchor="middle" fill="#1f4e79">vstup</text>
  </g>

  <g filter="url(#shadow)">
    <ellipse cx="300" cy="180" rx="80" ry="50" fill="#f2dbdb" stroke="#c00000" stroke-width="2.5" />
    <text x="300" y="190" font-family="Arial, sans-serif" font-size="28" font-weight="bold" text-anchor="middle" fill="#ff0000">procesy</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="450" y="150" width="130" height="60" fill="#c6d9f1" stroke="#1f4e79" stroke-width="2" />
    <text x="515" y="190" font-family="Arial, sans-serif" font-size="28" text-anchor="middle" fill="#1f4e79">výstup</text>
  </g>

  <g fill="none" stroke="#1f4e79" stroke-width="2">
    <path d="M 150,180 L 215,180" marker-end="url(#arrowhead)" />
    
    <path d="M 380,180 L 445,180" marker-end="url(#arrowhead)" />
    
    <path d="M 415,180 L 415,50 L 395,50" marker-end="url(#arrowhead)" />
    
    <path d="M 210,50 L 185,50 L 185,175" marker-end="url(#arrowhead)" />
  </g>
</svg>
