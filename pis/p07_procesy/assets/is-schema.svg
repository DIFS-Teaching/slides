<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 600 220" width="600" height="220"
     font-family="sans-serif" font-size="14" fill="#1f2937"
     xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4b5563"/>
    </marker>
  </defs>

  <!-- Vstup -->
  <rect x="20" y="85" width="100" height="50" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <text x="70" y="115" text-anchor="middle" font-weight="bold">vstup</text>

  <!-- Procesy -->
  <rect x="200" y="30" width="200" height="60" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="300" y="65" text-anchor="middle" font-weight="bold" font-size="15">procesy</text>

  <!-- Data -->
  <rect x="200" y="130" width="200" height="60" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="300" y="165" text-anchor="middle" font-weight="bold" font-size="15">data (stav)</text>

  <!-- Výstup -->
  <rect x="480" y="85" width="100" height="50" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <text x="530" y="115" text-anchor="middle" font-weight="bold">výstup</text>

  <!-- Šipky vstup → procesy -->
  <line x1="120" y1="100" x2="195" y2="65" stroke="#4b5563" stroke-width="2" marker-end="url(#arr)"/>
  <!-- vstup → data -->
  <line x1="120" y1="118" x2="195" y2="155" stroke="#4b5563" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Procesy ↔ Data -->
  <line x1="300" y1="92" x2="300" y2="128" stroke="#4b5563" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="285" y1="128" x2="285" y2="92" stroke="#4b5563" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Procesy → výstup -->
  <line x1="402" y1="65" x2="478" y2="100" stroke="#4b5563" stroke-width="2" marker-end="url(#arr)"/>
  <!-- Data → výstup -->
  <line x1="402" y1="155" x2="478" y2="118" stroke="#4b5563" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Popisky -->
  <text x="300" y="210" text-anchor="middle" font-size="12" fill="#6b7280">Procesy realizují transformace ve formě transakcí</text>
</svg>
