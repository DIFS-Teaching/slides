<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 820 380" width="820" height="380"
     font-family="sans-serif" font-size="13" fill="#1f2937"
     xmlns="http://www.w3.org/2000/svg">

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4b5563"/>
    </marker>
    <marker id="arr-ev" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
  </defs>

  <!-- ═══════════════════════════════════
       LEFT HALF – Orchestrace
  ═══════════════════════════════════ -->
  <rect x="10" y="10" width="390" height="360" rx="10"
        fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="205" y="38" text-anchor="middle" font-weight="bold" font-size="16" fill="#1e3a8a">Orchestrace</text>
  <text x="205" y="56" text-anchor="middle" font-size="12" fill="#3b82f6" font-style="italic">(centrální BPMN engine)</text>

  <!-- Engine box -->
  <rect x="130" y="70" width="150" height="52" rx="8"
        fill="#bfdbfe" stroke="#3b82f6" stroke-width="2"/>
  <text x="205" y="98" text-anchor="middle" font-weight="bold" font-size="14" fill="#1e3a8a">BPMN Engine</text>
  <text x="205" y="115" text-anchor="middle" font-size="11" fill="#1d4ed8">(Camunda, Flowable)</text>

  <!-- Service A -->
  <rect x="30"  y="190" width="110" height="42" rx="6"
        fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="85"  y="214" text-anchor="middle" font-size="13">Služba A</text>
  <!-- Service B -->
  <rect x="150" y="190" width="110" height="42" rx="6"
        fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="205" y="214" text-anchor="middle" font-size="13">Služba B</text>
  <!-- Service C -->
  <rect x="270" y="190" width="110" height="42" rx="6"
        fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="325" y="214" text-anchor="middle" font-size="13">Služba C</text>

  <!-- Engine → Services arrows -->
  <line x1="175" y1="122" x2="85"  y2="190" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="205" y1="122" x2="205" y2="190" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="235" y1="122" x2="325" y2="190" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- return arrows -->
  <line x1="85"  y1="190" x2="175" y2="122" stroke="#4b5563" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <line x1="205" y1="190" x2="205" y2="122" stroke="#4b5563" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <line x1="325" y1="190" x2="235" y2="122" stroke="#4b5563" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr)"/>

  <!-- pros/cons -->
  <text x="30" y="265" font-size="12" fill="#15803d">✔ Centrální viditelnost stavu</text>
  <text x="30" y="283" font-size="12" fill="#15803d">✔ Snadné ladění a monitoring</text>
  <text x="30" y="301" font-size="12" fill="#15803d">✔ Přímá implementace BPMN</text>
  <text x="30" y="323" font-size="12" fill="#b91c1c">✘ Engine = single point of failure</text>
  <text x="30" y="341" font-size="12" fill="#b91c1c">✘ Možný bottleneck při škálování</text>

  <!-- ═══════════════════════════════════
       RIGHT HALF – Choreografie
  ═══════════════════════════════════ -->
  <rect x="420" y="10" width="390" height="360" rx="10"
        fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="615" y="38" text-anchor="middle" font-weight="bold" font-size="16" fill="#4c1d95">Choreografie</text>
  <text x="615" y="56" text-anchor="middle" font-size="12" fill="#7c3aed" font-style="italic">(event-driven, bez centrálního koordinátora)</text>

  <!-- Event bus -->
  <rect x="490" y="70" width="250" height="42" rx="6"
        fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="615" y="94" text-anchor="middle" font-weight="bold" font-size="13" fill="#4c1d95">Message broker / Event bus</text>
  <text x="615" y="108" text-anchor="middle" font-size="11" fill="#6d28d9">(Kafka, RabbitMQ, …)</text>

  <!-- Service A -->
  <rect x="430" y="190" width="110" height="42" rx="6"
        fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="485" y="214" text-anchor="middle" font-size="13">Služba A</text>
  <!-- Service B -->
  <rect x="560" y="190" width="110" height="42" rx="6"
        fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="615" y="214" text-anchor="middle" font-size="13">Služba B</text>
  <!-- Service C -->
  <rect x="690" y="190" width="110" height="42" rx="6"
        fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="745" y="214" text-anchor="middle" font-size="13">Služba C</text>

  <!-- Services ↔ bus arrows -->
  <line x1="485" y1="190" x2="545" y2="112" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arr-ev)"/>
  <line x1="545" y1="112" x2="485" y2="190" stroke="#7c3aed" stroke-width="1"   stroke-dasharray="4,3" marker-end="url(#arr-ev)"/>
  <line x1="615" y1="190" x2="615" y2="112" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arr-ev)"/>
  <line x1="615" y1="112" x2="615" y2="190" stroke="#7c3aed" stroke-width="1"   stroke-dasharray="4,3" marker-end="url(#arr-ev)"/>
  <line x1="745" y1="190" x2="685" y2="112" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arr-ev)"/>
  <line x1="685" y1="112" x2="745" y2="190" stroke="#7c3aed" stroke-width="1"   stroke-dasharray="4,3" marker-end="url(#arr-ev)"/>

  <!-- pros/cons -->
  <text x="440" y="265" font-size="12" fill="#15803d">✔ Přirozeně škálovatelná</text>
  <text x="440" y="283" font-size="12" fill="#15803d">✔ Žádný single point of failure</text>
  <text x="440" y="301" font-size="12" fill="#15803d">✔ Volné vazby mezi službami</text>
  <text x="440" y="323" font-size="12" fill="#b91c1c">✘ Distribuovaný stav – těžší sledování</text>
  <text x="440" y="341" font-size="12" fill="#b91c1c">✘ Složitější ladění a testování</text>
</svg>
