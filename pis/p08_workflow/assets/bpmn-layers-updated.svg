<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 700 380" width="700" height="380"
     font-family="sans-serif" font-size="14" fill="#1f2937"
     xmlns="http://www.w3.org/2000/svg">

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4b5563"/>
    </marker>
  </defs>

  <!-- ── Layer 1: BPMN Notation ── -->
  <rect x="60" y="20" width="580" height="80" rx="10"
        fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="350" y="52" text-anchor="middle" font-weight="bold" font-size="17" fill="#1e3a8a">Vrstva 1 – BPMN notace</text>
  <text x="350" y="76" text-anchor="middle" font-size="13" fill="#1d4ed8">Grafické modelování procesů (diagramy, swimlanes, brány)</text>
  <text x="350" y="93" text-anchor="middle" font-size="12" fill="#3b82f6" font-style="italic">Nástroje: Camunda Modeler, draw.io, Signavio, Bizagi</text>

  <!-- arrow 1→2 -->
  <line x1="350" y1="100" x2="350" y2="148"
        stroke="#4b5563" stroke-width="2" marker-end="url(#arr)"/>
  <text x="370" y="130" font-size="12" fill="#6b7280" font-style="italic">BPMN 2.0 XML serializace</text>

  <!-- ── Layer 2: BPMN 2.0 XML ── -->
  <rect x="60" y="150" width="580" height="80" rx="10"
        fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="350" y="182" text-anchor="middle" font-weight="bold" font-size="17" fill="#14532d">Vrstva 2 – BPMN 2.0 XML</text>
  <text x="350" y="206" text-anchor="middle" font-size="13" fill="#15803d">Přenositelná strojová reprezentace procesu</text>
  <text x="350" y="223" text-anchor="middle" font-size="12" fill="#16a34a" font-style="italic">&lt;process&gt;, &lt;startEvent&gt;, &lt;sequenceFlow&gt;, …</text>

  <!-- arrow 2→3 -->
  <line x1="350" y1="230" x2="350" y2="278"
        stroke="#4b5563" stroke-width="2" marker-end="url(#arr)"/>
  <text x="370" y="260" font-size="12" fill="#6b7280" font-style="italic">deploy / nasazení</text>

  <!-- ── Layer 3: BPMN Engine ── -->
  <rect x="60" y="280" width="580" height="80" rx="10"
        fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <text x="350" y="312" text-anchor="middle" font-weight="bold" font-size="17" fill="#713f12">Vrstva 3 – BPMN engine</text>
  <text x="350" y="336" text-anchor="middle" font-size="13" fill="#92400e">Interpretace a řízení běžících instancí procesu</text>
  <text x="350" y="353" text-anchor="middle" font-size="12" fill="#b45309" font-style="italic">Camunda 7/8 · Flowable · Kogito · Activiti</text>
</svg>
