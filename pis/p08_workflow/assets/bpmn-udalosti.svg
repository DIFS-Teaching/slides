<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 820 460" width="820" height="460"
     font-family="sans-serif" font-size="13" fill="#1f2937"
     xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Timer icon helper lines drawn inline -->
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4b5563"/>
    </marker>
  </defs>

  <!-- ── Column headers ── -->
  <text x="60"  y="22" text-anchor="middle" font-weight="bold" font-size="14" fill="#374151">Začátek</text>
  <text x="60"  y="38" text-anchor="middle" font-size="11" fill="#6b7280">(tenký okraj)</text>
  <text x="240" y="22" text-anchor="middle" font-weight="bold" font-size="14" fill="#374151">Mezilehlá</text>
  <text x="240" y="38" text-anchor="middle" font-size="11" fill="#6b7280">(dvojitý okraj)</text>
  <text x="420" y="22" text-anchor="middle" font-weight="bold" font-size="14" fill="#374151">Konec</text>
  <text x="420" y="38" text-anchor="middle" font-size="11" fill="#6b7280">(silný okraj)</text>
  <text x="630" y="22" text-anchor="middle" font-weight="bold" font-size="14" fill="#374151">Boundary</text>
  <text x="630" y="38" text-anchor="middle" font-size="11" fill="#6b7280">(na aktivitě)</text>

  <!-- separator line -->
  <line x1="10" y1="46" x2="810" y2="46" stroke="#e5e7eb" stroke-width="1"/>

  <!-- ══════════════════════════════════════════
       ROW 1 – None / plain
  ══════════════════════════════════════════ -->
  <text x="10" y="90" font-size="12" fill="#6b7280" font-style="italic">None</text>
  <!-- Start None -->
  <circle cx="60"  cy="82" r="18" fill="white" stroke="#16a34a" stroke-width="2.5"/>
  <text x="60"  y="115" text-anchor="middle" font-size="11">Začátek</text>
  <!-- Intermediate None -->
  <circle cx="240" cy="82" r="18" fill="white" stroke="#ca8a04" stroke-width="2.5"/>
  <circle cx="240" cy="82" r="13" fill="none"  stroke="#ca8a04" stroke-width="1.5"/>
  <text x="240" y="115" text-anchor="middle" font-size="11">Mezilehlá</text>
  <!-- End None -->
  <circle cx="420" cy="82" r="18" fill="white" stroke="#dc2626" stroke-width="4.5"/>
  <text x="420" y="115" text-anchor="middle" font-size="11">Konec</text>
  <!-- Boundary None (non-interrupting dashed) -->
  <circle cx="620" cy="82" r="18" fill="white" stroke="#ca8a04" stroke-width="2.5" stroke-dasharray="5,3"/>
  <circle cx="620" cy="82" r="13" fill="none"  stroke="#ca8a04" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="620" y="115" text-anchor="middle" font-size="11">nepřerušující</text>
  <!-- Boundary interrupting -->
  <circle cx="700" cy="82" r="18" fill="white" stroke="#ca8a04" stroke-width="2.5"/>
  <circle cx="700" cy="82" r="13" fill="none"  stroke="#ca8a04" stroke-width="1.5"/>
  <text x="700" y="115" text-anchor="middle" font-size="11">přerušující</text>

  <!-- ══════════════════════════════════════════
       ROW 2 – Timer
  ══════════════════════════════════════════ -->
  <text x="10" y="155" font-size="12" fill="#6b7280" font-style="italic">Timer</text>
  <!-- Start Timer -->
  <circle cx="60"  cy="147" r="18" fill="white" stroke="#16a34a" stroke-width="2.5"/>
  <circle cx="60"  cy="147" r="12" fill="none"  stroke="#16a34a" stroke-width="1.2"/>
  <line x1="60" y1="138" x2="60" y2="147" stroke="#16a34a" stroke-width="1.5"/>
  <line x1="60" y1="147" x2="67" y2="147" stroke="#16a34a" stroke-width="1.5"/>
  <text x="60"  y="180" text-anchor="middle" font-size="11">Časovač</text>
  <!-- Intermediate Timer -->
  <circle cx="240" cy="147" r="18" fill="white" stroke="#ca8a04" stroke-width="2.5"/>
  <circle cx="240" cy="147" r="13" fill="none"  stroke="#ca8a04" stroke-width="1.5"/>
  <circle cx="240" cy="147" r="9"  fill="none"  stroke="#ca8a04" stroke-width="1.2"/>
  <line x1="240" y1="140" x2="240" y2="147" stroke="#ca8a04" stroke-width="1.5"/>
  <line x1="240" y1="147" x2="246" y2="147" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="240" y="180" text-anchor="middle" font-size="11">Časovač</text>
  <!-- Boundary Timer (interrupting) -->
  <circle cx="660" cy="147" r="18" fill="white" stroke="#ca8a04" stroke-width="2.5"/>
  <circle cx="660" cy="147" r="13" fill="none"  stroke="#ca8a04" stroke-width="1.5"/>
  <circle cx="660" cy="147" r="9"  fill="none"  stroke="#ca8a04" stroke-width="1.2"/>
  <line x1="660" y1="140" x2="660" y2="147" stroke="#ca8a04" stroke-width="1.5"/>
  <line x1="660" y1="147" x2="666" y2="147" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="660" y="180" text-anchor="middle" font-size="11">Časovač (boundary)</text>

  <!-- ══════════════════════════════════════════
       ROW 3 – Message
  ══════════════════════════════════════════ -->
  <text x="10" y="220" font-size="12" fill="#6b7280" font-style="italic">Message</text>
  <!-- Start Message -->
  <circle cx="60"  cy="212" r="18" fill="white" stroke="#16a34a" stroke-width="2.5"/>
  <rect   x="46"  y="202" width="28" height="20" rx="2" fill="none" stroke="#16a34a" stroke-width="1.5"/>
  <polyline points="46,202 60,214 74,202" fill="none" stroke="#16a34a" stroke-width="1.5"/>
  <text x="60"  y="245" text-anchor="middle" font-size="11">Zpráva (start)</text>
  <!-- Intermediate Message -->
  <circle cx="240" cy="212" r="18" fill="white" stroke="#ca8a04" stroke-width="2.5"/>
  <circle cx="240" cy="212" r="13" fill="none"  stroke="#ca8a04" stroke-width="1.5"/>
  <rect   x="229" y="204" width="22" height="16" rx="2" fill="none" stroke="#ca8a04" stroke-width="1.5"/>
  <polyline points="229,204 240,213 251,204" fill="none" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="240" y="245" text-anchor="middle" font-size="11">Zpráva</text>
  <!-- End Message -->
  <circle cx="420" cy="212" r="18" fill="white" stroke="#dc2626" stroke-width="4.5"/>
  <rect   x="409" y="204" width="22" height="16" rx="2" fill="#dc2626" stroke="none"/>
  <polyline points="409,204 420,213 431,204" fill="none" stroke="white" stroke-width="1.5"/>
  <text x="420" y="245" text-anchor="middle" font-size="11">Zpráva (konec)</text>
  <!-- Boundary Message -->
  <circle cx="660" cy="212" r="18" fill="white" stroke="#ca8a04" stroke-width="2.5"/>
  <circle cx="660" cy="212" r="13" fill="none"  stroke="#ca8a04" stroke-width="1.5"/>
  <rect   x="649" y="204" width="22" height="16" rx="2" fill="none" stroke="#ca8a04" stroke-width="1.5"/>
  <polyline points="649,204 660,213 671,204" fill="none" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="660" y="245" text-anchor="middle" font-size="11">Zpráva (boundary)</text>

  <!-- ══════════════════════════════════════════
       ROW 4 – Error / Compensation
  ══════════════════════════════════════════ -->
  <text x="10" y="285" font-size="12" fill="#6b7280" font-style="italic">Error / Comp.</text>
  <!-- Intermediate Error -->
  <circle cx="240" cy="277" r="18" fill="white" stroke="#ca8a04" stroke-width="2.5"/>
  <circle cx="240" cy="277" r="13" fill="none"  stroke="#ca8a04" stroke-width="1.5"/>
  <!-- lightning bolt -->
  <polyline points="244,265 238,277 243,277 237,289" fill="none" stroke="#ca8a04" stroke-width="2"/>
  <text x="240" y="310" text-anchor="middle" font-size="11">Chyba</text>
  <!-- End Error -->
  <circle cx="420" cy="277" r="18" fill="white" stroke="#dc2626" stroke-width="4.5"/>
  <polyline points="424,265 418,277 423,277 417,289" fill="none" stroke="#dc2626" stroke-width="2"/>
  <text x="420" y="310" text-anchor="middle" font-size="11">Chyba (konec)</text>
  <!-- Intermediate Compensation -->
  <circle cx="560" cy="277" r="18" fill="white" stroke="#ca8a04" stroke-width="2.5"/>
  <circle cx="560" cy="277" r="13" fill="none"  stroke="#ca8a04" stroke-width="1.5"/>
  <!-- rewind arrows -->
  <polygon points="568,270 558,277 568,284" fill="none" stroke="#ca8a04" stroke-width="1.5"/>
  <polygon points="560,270 550,277 560,284" fill="none" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="560" y="310" text-anchor="middle" font-size="11">Kompenzace</text>
  <!-- End Terminate -->
  <circle cx="700" cy="277" r="18" fill="white" stroke="#dc2626" stroke-width="4.5"/>
  <circle cx="700" cy="277" r="10" fill="#dc2626"/>
  <text x="700" y="310" text-anchor="middle" font-size="11">Terminate (konec)</text>

  <!-- ══════════════════════════════════════════
       Legend box
  ══════════════════════════════════════════ -->
  <rect x="10" y="330" width="800" height="118" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="410" y="352" text-anchor="middle" font-weight="bold" font-size="13">Pravidla pro boundary události</text>
  <circle cx="40"  cy="375" r="12" fill="white" stroke="#ca8a04" stroke-width="2.5"/>
  <circle cx="40"  cy="375" r="8"  fill="none"  stroke="#ca8a04" stroke-width="1.5"/>
  <text x="60" y="380" font-size="12">= přerušující (interrupting) – aktivita se zastaví, tok pokračuje do obslužné větve</text>
  <circle cx="40"  cy="405" r="12" fill="white" stroke="#ca8a04" stroke-width="2.5" stroke-dasharray="5,3"/>
  <circle cx="40"  cy="405" r="8"  fill="none"  stroke="#ca8a04" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="60" y="410" font-size="12">= nepřerušující (non-interrupting) – aktivita pokračuje, spustí se paralelní tok</text>
  <text x="25" y="438" font-size="12" fill="#6b7280">Boundary event je přichycen k hranici aktivity nebo podprocesu.</text>
</svg>
