<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 860 500" width="860" height="500"
     font-family="sans-serif" font-size="12" fill="#1f2937"
     xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#374151"/>
    </marker>
    <!-- task rounded rect -->
  </defs>

  <!-- Helper macro-like elements via reuse -->

  <!-- ===== ROW 1 ===== -->

  <!-- 1. Sekvence -->
  <text x="10" y="20" font-weight="bold" font-size="13">1. Sekvence</text>
  <circle cx="30" cy="55" r="10" fill="white" stroke="#16a34a" stroke-width="2"/>
  <line x1="40" y1="55" x2="58" y2="55" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="60" y="43" width="55" height="26" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="87" y="61" text-anchor="middle" font-size="11">A</text>
  <line x1="115" y1="55" x2="133" y2="55" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="135" y="43" width="55" height="26" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="162" y="61" text-anchor="middle" font-size="11">B</text>
  <line x1="190" y1="55" x2="208" y2="55" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <circle cx="218" cy="55" r="10" fill="white" stroke="#dc2626" stroke-width="3"/>
  <text x="125" y="90" text-anchor="middle" font-size="10" fill="#6b7280">A musí skončit před B</text>

  <!-- 2. AND-split (Parallel split) -->
  <text x="270" y="20" font-weight="bold" font-size="13">2. Parallel Split (AND-split)</text>
  <circle cx="285" cy="55" r="10" fill="white" stroke="#16a34a" stroke-width="2"/>
  <line x1="295" y1="55" x2="315" y2="55" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <polygon points="325,43 347,55 325,67 303,55" fill="white" stroke="#f59e0b" stroke-width="2"/>
  <text x="325" y="59" text-anchor="middle" font-size="13" font-weight="bold" fill="#f59e0b">+</text>
  <line x1="347" y1="50" x2="368" y2="42" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="347" y1="60" x2="368" y2="68" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="370" y="30" width="50" height="22" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="395" y="46" text-anchor="middle" font-size="11">B</text>
  <rect x="370" y="58" width="50" height="22" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="395" y="74" text-anchor="middle" font-size="11">C</text>
  <text x="370" y="96" text-anchor="middle" font-size="10" fill="#6b7280">B a C paralelně</text>

  <!-- 3. AND-join (Synchronizace) -->
  <text x="460" y="20" font-weight="bold" font-size="13">3. Synchronizace (AND-join)</text>
  <rect x="462" y="30" width="50" height="22" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="487" y="46" text-anchor="middle" font-size="11">B</text>
  <rect x="462" y="58" width="50" height="22" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="487" y="74" text-anchor="middle" font-size="11">C</text>
  <line x1="512" y1="41" x2="533" y2="50" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="512" y1="69" x2="533" y2="60" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <polygon points="552,43 574,55 552,67 530,55" fill="white" stroke="#f59e0b" stroke-width="2"/>
  <text x="552" y="59" text-anchor="middle" font-size="13" font-weight="bold" fill="#f59e0b">+</text>
  <line x1="574" y1="55" x2="592" y2="55" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="594" y="43" width="50" height="22" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="619" y="59" text-anchor="middle" font-size="11">D</text>
  <line x1="644" y1="55" x2="660" y2="55" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <circle cx="670" cy="55" r="10" fill="white" stroke="#dc2626" stroke-width="3"/>
  <text x="566" y="96" text-anchor="middle" font-size="10" fill="#6b7280">D začne až skončí B i C</text>

  <!-- ===== ROW 2 ===== -->

  <!-- 4. XOR-split -->
  <text x="10" y="130" font-weight="bold" font-size="13">4. Výlučné rozhodnutí (XOR-split)</text>
  <circle cx="30" cy="170" r="10" fill="white" stroke="#16a34a" stroke-width="2"/>
  <rect x="50" y="158" width="50" height="26" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="75" y="176" text-anchor="middle" font-size="11">A</text>
  <line x1="40" y1="170" x2="48" y2="170" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="100" y1="170" x2="118" y2="170" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <polygon points="128,158 150,170 128,182 106,170" fill="white" stroke="#f59e0b" stroke-width="2"/>
  <text x="128" y="174" text-anchor="middle" font-size="13" font-weight="bold" fill="#f59e0b">×</text>
  <line x1="150" y1="165" x2="172" y2="157" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="150" y1="175" x2="172" y2="183" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="174" y="145" width="50" height="22" rx="5" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="199" y="161" text-anchor="middle" font-size="11">B</text>
  <rect x="174" y="173" width="50" height="22" rx="5" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="199" y="189" text-anchor="middle" font-size="11">C</text>
  <text x="120" y="210" text-anchor="middle" font-size="10" fill="#6b7280">Právě jedna větev (podmínka)</text>

  <!-- 5. XOR-merge -->
  <text x="270" y="130" font-weight="bold" font-size="13">5. Jednoduché spojení (XOR-merge)</text>
  <rect x="272" y="148" width="50" height="22" rx="5" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="297" y="164" text-anchor="middle" font-size="11">B</text>
  <rect x="272" y="176" width="50" height="22" rx="5" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="297" y="192" text-anchor="middle" font-size="11">C</text>
  <line x1="322" y1="159" x2="343" y2="168" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="322" y1="187" x2="343" y2="178" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <polygon points="362,158 384,170 362,182 340,170" fill="white" stroke="#f59e0b" stroke-width="2"/>
  <text x="362" y="174" text-anchor="middle" font-size="13" font-weight="bold" fill="#f59e0b">×</text>
  <line x1="384" y1="170" x2="402" y2="170" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="404" y="158" width="50" height="22" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="429" y="174" text-anchor="middle" font-size="11">D</text>
  <text x="362" y="210" text-anchor="middle" font-size="10" fill="#6b7280">Okamžitě po příchodu jedné větve</text>

  <!-- 6. OR-split (Multi-choice) -->
  <text x="500" y="130" font-weight="bold" font-size="13">6. Vícenásobná volba (OR-split)</text>
  <circle cx="510" cy="170" r="10" fill="white" stroke="#16a34a" stroke-width="2"/>
  <line x1="520" y1="170" x2="538" y2="170" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <polygon points="548,158 570,170 548,182 526,170" fill="white" stroke="#f59e0b" stroke-width="2"/>
  <circle cx="548" cy="170" r="7" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
  <line x1="570" y1="162" x2="592" y2="152" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="570" y1="170" x2="592" y2="170" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="570" y1="178" x2="592" y2="188" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="594" y="140" width="45" height="20" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="617" y="155" text-anchor="middle" font-size="10">B</text>
  <rect x="594" y="160" width="45" height="20" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="617" y="175" text-anchor="middle" font-size="10">C</text>
  <rect x="594" y="180" width="45" height="20" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="617" y="195" text-anchor="middle" font-size="10">D</text>
  <text x="548" y="210" text-anchor="middle" font-size="10" fill="#6b7280">1..N větví (podmínky)</text>

  <!-- ===== ROW 3 ===== -->

  <!-- 7. OR-join (Structured synchronizing merge) -->
  <text x="10" y="250" font-weight="bold" font-size="13">7. Synchronizující sloučení (OR-join)</text>
  <rect x="12" y="268" width="45" height="20" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="35" y="283" text-anchor="middle" font-size="10">B</text>
  <rect x="12" y="296" width="45" height="20" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="35" y="311" text-anchor="middle" font-size="10">C</text>
  <rect x="12" y="324" width="45" height="20" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="35" y="339" text-anchor="middle" font-size="10">D</text>
  <line x1="57" y1="278" x2="78" y2="290" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="57" y1="306" x2="78" y2="302" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="57" y1="334" x2="78" y2="315" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <polygon points="98,290 120,302 98,314 76,302" fill="white" stroke="#f59e0b" stroke-width="2"/>
  <circle cx="98" cy="302" r="7" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
  <line x1="120" y1="302" x2="138" y2="302" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="140" y="291" width="50" height="22" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="165" y="307" text-anchor="middle" font-size="11">E</text>
  <text x="98" y="346" text-anchor="middle" font-size="10" fill="#6b7280">Čeká na všechny spuštěné větve</text>

  <!-- ===== LEGENDA ===== -->
  <rect x="0" y="380" width="860" height="115" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="430" y="400" text-anchor="middle" font-weight="bold" font-size="13">Shrnutí: Gateway typy</text>

  <polygon points="60,430 82,442 60,454 38,442" fill="white" stroke="#f59e0b" stroke-width="2"/>
  <text x="60" y="446" text-anchor="middle" font-size="14" font-weight="bold" fill="#f59e0b">×</text>
  <text x="60" y="472" text-anchor="middle" font-size="11" font-weight="bold">XOR</text>
  <text x="60" y="487" text-anchor="middle" font-size="10" fill="#6b7280">Výlučná volba</text>

  <polygon points="200,430 222,442 200,454 178,442" fill="white" stroke="#f59e0b" stroke-width="2"/>
  <text x="200" y="446" text-anchor="middle" font-size="14" font-weight="bold" fill="#f59e0b">+</text>
  <text x="200" y="472" text-anchor="middle" font-size="11" font-weight="bold">AND</text>
  <text x="200" y="487" text-anchor="middle" font-size="10" fill="#6b7280">Paralelní zpracování</text>

  <polygon points="340,430 362,442 340,454 318,442" fill="white" stroke="#f59e0b" stroke-width="2"/>
  <circle cx="340" cy="442" r="9" fill="none" stroke="#f59e0b" stroke-width="1.8"/>
  <text x="340" y="472" text-anchor="middle" font-size="11" font-weight="bold">OR</text>
  <text x="340" y="487" text-anchor="middle" font-size="10" fill="#6b7280">Inkluzivní volba (1..N)</text>

  <line x1="440" y1="400" x2="860" y2="400" stroke="#e5e7eb" stroke-width="1"/>
  <text x="650" y="420" text-anchor="middle" font-size="12">Split = rozbočení toku na více větví</text>
  <text x="650" y="440" text-anchor="middle" font-size="12">Join/Merge = sloučení více větví do jedné</text>
  <text x="650" y="460" text-anchor="middle" font-size="12" fill="#6b7280">Zdroj: workflowpatterns.com (van der Aalst et al.)</text>
</svg>
