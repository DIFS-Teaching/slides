<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 820 430" width="820" height="430"
     font-family="sans-serif" font-size="13" fill="#1f2937"
     xmlns="http://www.w3.org/2000/svg">

  <!-- === EVENTS === -->
  <text x="10" y="22" font-weight="bold" font-size="15">Události (Events)</text>

  <!-- Start event -->
  <circle cx="50" cy="60" r="18" fill="white" stroke="#16a34a" stroke-width="2.5"/>
  <text x="50" y="95" text-anchor="middle" font-size="11">Začátek</text>

  <!-- Intermediate event -->
  <circle cx="140" cy="60" r="18" fill="white" stroke="#ca8a04" stroke-width="2.5"/>
  <circle cx="140" cy="60" r="13" fill="none" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="140" y="95" text-anchor="middle" font-size="11">Mezilehlá</text>

  <!-- End event -->
  <circle cx="230" cy="60" r="18" fill="white" stroke="#dc2626" stroke-width="4"/>
  <text x="230" y="95" text-anchor="middle" font-size="11">Konec</text>

  <!-- Message start -->
  <circle cx="320" cy="60" r="18" fill="white" stroke="#16a34a" stroke-width="2.5"/>
  <rect x="306" y="50" width="28" height="20" rx="2" fill="none" stroke="#16a34a" stroke-width="1.5"/>
  <polyline points="306,50 320,62 334,50" fill="none" stroke="#16a34a" stroke-width="1.5"/>
  <text x="320" y="95" text-anchor="middle" font-size="11">Zpráva (start)</text>

  <!-- Timer start -->
  <circle cx="410" cy="60" r="18" fill="white" stroke="#16a34a" stroke-width="2.5"/>
  <circle cx="410" cy="60" r="12" fill="none" stroke="#16a34a" stroke-width="1.2"/>
  <line x1="410" y1="51" x2="410" y2="60" stroke="#16a34a" stroke-width="1.5"/>
  <line x1="410" y1="60" x2="417" y2="60" stroke="#16a34a" stroke-width="1.5"/>
  <text x="410" y="95" text-anchor="middle" font-size="11">Časovač (start)</text>

  <!-- === ACTIVITIES === -->
  <text x="10" y="130" font-weight="bold" font-size="15">Aktivity (Activities)</text>

  <!-- Task -->
  <rect x="15" y="145" width="100" height="55" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="65" y="177" text-anchor="middle" font-size="12">Úloha (Task)</text>

  <!-- Subprocess -->
  <rect x="140" y="145" width="100" height="55" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="190" y="170" text-anchor="middle" font-size="12">Podproces</text>
  <rect x="183" y="188" width="14" height="10" rx="1" fill="white" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="190" y="196" text-anchor="middle" font-size="9" fill="#3b82f6">+</text>

  <!-- Multi-instance task -->
  <rect x="265" y="145" width="100" height="55" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="315" y="168" text-anchor="middle" font-size="12">Opakující se</text>
  <text x="315" y="183" text-anchor="middle" font-size="12">úloha</text>
  <line x1="308" y1="193" x2="308" y2="199" stroke="#3b82f6" stroke-width="1.5"/>
  <line x1="315" y1="193" x2="315" y2="199" stroke="#3b82f6" stroke-width="1.5"/>
  <line x1="322" y1="193" x2="322" y2="199" stroke="#3b82f6" stroke-width="1.5"/>

  <!-- === GATEWAYS === -->
  <text x="10" y="235" font-weight="bold" font-size="15">Brány (Gateways)</text>

  <!-- XOR gateway -->
  <polygon points="50,255 75,275 50,295 25,275" fill="white" stroke="#f59e0b" stroke-width="2"/>
  <text x="50" y="279" text-anchor="middle" font-size="14" font-weight="bold" fill="#f59e0b">×</text>
  <text x="50" y="315" text-anchor="middle" font-size="11">XOR (výlučné)</text>

  <!-- AND gateway -->
  <polygon points="140,255 165,275 140,295 115,275" fill="white" stroke="#f59e0b" stroke-width="2"/>
  <text x="140" y="279" text-anchor="middle" font-size="14" font-weight="bold" fill="#f59e0b">+</text>
  <text x="140" y="315" text-anchor="middle" font-size="11">AND (paralelní)</text>

  <!-- OR gateway -->
  <polygon points="230,255 255,275 230,295 205,275" fill="white" stroke="#f59e0b" stroke-width="2"/>
  <circle cx="230" cy="275" r="9" fill="none" stroke="#f59e0b" stroke-width="1.8"/>
  <text x="230" y="315" text-anchor="middle" font-size="11">OR (inkluzivní)</text>

  <!-- Event-based gateway -->
  <polygon points="320,255 345,275 320,295 295,275" fill="white" stroke="#f59e0b" stroke-width="2"/>
  <circle cx="320" cy="275" r="11" fill="none" stroke="#f59e0b" stroke-width="1.2"/>
  <circle cx="320" cy="275" r="7" fill="none" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="320" y="315" text-anchor="middle" font-size="11">Na základě</text>
  <text x="320" y="328" text-anchor="middle" font-size="11">události</text>

  <!-- === CONNECTIONS === -->
  <text x="10" y="360" font-weight="bold" font-size="15">Spojovací objekty</text>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4b5563"/>
    </marker>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
  </defs>

  <!-- Sequence flow -->
  <line x1="15" y1="390" x2="110" y2="390" stroke="#4b5563" stroke-width="2" marker-end="url(#arr)"/>
  <text x="63" y="410" text-anchor="middle" font-size="11">Sekvenční tok</text>

  <!-- Message flow -->
  <line x1="140" y1="390" x2="235" y2="390" stroke="#3b82f6" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#arr-blue)"/>
  <circle cx="140" cy="390" r="4" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="188" y="410" text-anchor="middle" font-size="11">Tok zpráv</text>

  <!-- Association -->
  <line x1="265" y1="390" x2="360" y2="390" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <text x="313" y="410" text-anchor="middle" font-size="11">Asociace</text>

  <!-- === RIGHT COLUMN: Labels === -->
  <rect x="490" y="10" width="320" height="410" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="650" y="35" text-anchor="middle" font-weight="bold" font-size="14">Swimlanes</text>

  <!-- Pool -->
  <rect x="505" y="50" width="290" height="170" rx="4" fill="none" stroke="#374151" stroke-width="2"/>
  <rect x="505" y="50" width="35" height="170" rx="4" fill="#e5e7eb" stroke="#374151" stroke-width="2"/>
  <text x="523" y="138" text-anchor="middle" font-size="12" font-weight="bold" transform="rotate(-90,523,138)">Pool</text>

  <!-- Lane 1 -->
  <rect x="540" y="50" width="255" height="85" fill="#dbeafe" stroke="#374151" stroke-width="1"/>
  <rect x="540" y="50" width="35" height="85" fill="#bfdbfe" stroke="#374151" stroke-width="1"/>
  <text x="558" y="97" text-anchor="middle" font-size="11" transform="rotate(-90,558,97)">Lane 1</text>
  <circle cx="610" cy="93" r="12" fill="white" stroke="#16a34a" stroke-width="2"/>
  <rect x="645" y="78" width="70" height="35" rx="6" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="680" y="100" text-anchor="middle" font-size="11">Aktivita</text>
  <line x1="622" y1="93" x2="643" y2="93" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arr)"/>
  <circle cx="755" cy="93" r="12" fill="white" stroke="#dc2626" stroke-width="3.5"/>
  <line x1="717" y1="93" x2="741" y2="93" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Lane 2 -->
  <rect x="540" y="135" width="255" height="85" fill="#dcfce7" stroke="#374151" stroke-width="1"/>
  <rect x="540" y="135" width="35" height="85" fill="#bbf7d0" stroke="#374151" stroke-width="1"/>
  <text x="558" y="178" text-anchor="middle" font-size="11" transform="rotate(-90,558,178)">Lane 2</text>
  <rect x="620" y="150" width="70" height="35" rx="6" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="655" y="172" text-anchor="middle" font-size="11">Aktivita</text>

  <text x="650" y="250" text-anchor="middle" font-size="12" fill="#6b7280">Pool = účastník procesu</text>
  <text x="650" y="268" text-anchor="middle" font-size="12" fill="#6b7280">Lane = kategorie aktivit / role</text>
  <text x="650" y="286" text-anchor="middle" font-size="12" fill="#6b7280">Mezi pooly → tok zpráv</text>

  <!-- Popis objektů toku -->
  <text x="650" y="320" text-anchor="middle" font-weight="bold" font-size="13">Artefakty</text>
  <rect x="510" y="330" width="80" height="30" rx="3" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="550" y="350" text-anchor="middle" font-size="11">Datový objekt</text>
  <rect x="610" y="330" width="80" height="30" rx="3" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="650" y="350" text-anchor="middle" font-size="11">Skupina</text>
  <rect x="710" y="330" width="90" height="30" rx="3" fill="white" stroke="#9ca3af" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="755" y="350" text-anchor="middle" font-size="11">Poznámka</text>
</svg>
